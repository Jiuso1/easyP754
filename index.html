<!DOCTYPE html>
<html lang="es">

<head>
    <title>EasyP754</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/x-icon" href="./calculatorIcon.svg">
</head>

<body>
    <div class="title">
        <a href="https://www.pcjs.org/" target="_blank">
            <h1><span id="easy">Easy</span><span id="p">P</span><span id="number754">754</span></h1>
        </a>
    </div>
    <form id="systemForm">
        <h2>¿Qué modo desea emplear?</h2>
        <fieldset>
            <input type="radio" id="simplePrecision" name="precisionMode" value="simplePrecision">
            <label for="simplePrecision">Simple precisión (32 bits)</label>
        </fieldset>
        <fieldset>
            <input type="radio" id="doublePrecision" name="precisionMode" value="doublePrecision">
            <label for="doublePrecision">Doble precisión (64 bits)</label>
        </fieldset>
        <h2>¿Qué número desea representar?</h2>
        <h3>Ejemplos de sintaxis: 0.5 ó 3.1416 ó -654000.33 ó +∞ ó 2**(-13)</h3>
        <fieldset>
            <input type="text" id="number" name="number" value="" required>
        </fieldset>
        <input type="submit" value="Calcular representación">
    </form>
    <script src="./decimal.js/decimal.js"></script>
    <script type="module">
        import Decimal from './decimal.js/decimal.mjs';
    </script>
    <script src="./script.js"></script>
</body>

</html>
